version: '3.8'

services:
  server:
    build: ./server
    command: npm run dev
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_USER: sa
      DB_PASSWORD: "Rfx14w.14w."
      DB_SERVER: 10.0.1.90
      DB_DATABASE: PayrollDB
      DB_TRUST_SERVER_CERTIFICATE: "true"
      JWT_SECRET: "supersecretkey123"
    restart: always

  client:
    build: ./client
    # For development, we can mount the client too
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: always
